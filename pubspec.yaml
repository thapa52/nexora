name: nexora
description: "Nexora - A modern developer news and bookmarking app built with Flutter and Clean Architecture"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Cone Generation
  riverpod_generator: ^2.6.5
  build_runner: ^2.5.4

flutter:
  uses-material-design: true
